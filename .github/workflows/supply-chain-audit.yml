name: Supply Chain Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**/*.py'
      - '**/*.pth'
      - '**/setup.py'
      - '**/setup.cfg'
      - '**/sitecustomize.py'
      - '**/usercustomize.py'
      - '**/__init__.pth'
      - 'pyproject.toml'

permissions:
  pull-requests: write
  contents: read

# Narrow, high-signal scanner. Only fires on critical indicators of supply
# chain attacks (e.g. the litellm-style payloads). Low-signal heuristics
# (plain base64, plain exec/eval, dependency/Dockerfile/workflow edits,
# Actions version unpinning, outbound POST/PUT) were intentionally
# removed — they fired on nearly every PR and trained reviewers to ignore
# the scanner. Keep this file's checks ruthlessly narrow: if you find
# yourself adding WARNING-tier patterns here again, make a separate
# advisory-only workflow instead.

jobs:
  scan:
    name: Scan PR for critical supply chain risks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Scan diff for critical patterns
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # Added lines only, excluding lockfiles.
          DIFF=$(git diff "$BASE".."$HEAD" -- . ':!uv.lock' ':!*.lock' ':!package-lock.json' ':!yarn.lock' || true)

          FINDINGS=""
          WARNINGS=""

          # --- .pth files (auto-execute on Python startup) ---
          # The exact mechanism used in the litellm supply chain attack:
          # https://github.com/BerriAI/litellm/issues/24512
          PTH_FILES=$(git diff --name-only "$BASE".."$HEAD" | grep '\.pth$' || true)
          if [ -n "$PTH_FILES" ]; then
            FINDINGS="${FINDINGS}
          ### 🚨 CRITICAL: .pth file added or modified
          Python \`.pth\` files in \`site-packages/\` execute automatically when the interpreter starts — no import required.

          **Files:**
          \`\`\`
          ${PTH_FILES}
          \`\`\`
          "
          fi

          # --- base64 decode + exec/eval on the same line (the litellm attack pattern) ---
          B64_EXEC_HITS=$(echo "$DIFF" | grep -n '^\+' | grep -iE 'base64\.(b64decode|decodebytes|urlsafe_b64decode)' | grep -iE 'exec\(|eval\(' | head -10 || true)
          if [ -n "$B64_EXEC_HITS" ]; then
            FINDINGS="${FINDINGS}
          ### 🚨 CRITICAL: base64 decode + exec/eval combo
          Base64-decoded strings passed directly to exec/eval — the signature of hidden credential-stealing payloads.

          **Matches:**
          \`\`\`
          ${B64_EXEC_HITS}
          \`\`\`
          "
          fi

          # --- subprocess with encoded/obfuscated command argument ---
          PROC_HITS=$(echo "$DIFF" | grep -n '^\+' | grep -E 'subprocess\.(Popen|call|run)\s*\(' | grep -iE 'base64|\\x[0-9a-f]{2}|chr\(' | head -10 || true)
          if [ -n "$PROC_HITS" ]; then
            FINDINGS="${FINDINGS}
          ### 🚨 CRITICAL: subprocess with encoded/obfuscated command
          Subprocess calls whose command strings are base64- or hex-encoded are a strong indicator of payload execution.

          **Matches:**
          \`\`\`
          ${PROC_HITS}
          \`\`\`
          "
          fi

          # --- Install/runtime auto-start hooks ---
          # sitecustomize.py, usercustomize.py and __init__.pth execute on interpreter startup.
          # Keep these filename-only checks critical because their presence is already high-signal.
          AUTOSTART_HITS=$(git diff --name-only "$BASE".."$HEAD" | grep -E '(^|/)(sitecustomize\.py|usercustomize\.py|__init__\.pth)$' || true)
          if [ -n "$AUTOSTART_HITS" ]; then
            FINDINGS="${FINDINGS}
          ### 🚨 CRITICAL: Python auto-start hook file added or modified
          These files can execute code during interpreter startup.

          **Files:**
          \`\`\`
          ${AUTOSTART_HITS}
          \`\`\`
          "
          fi

          # --- setup.py/setup.cfg files ---
          # setup.py/setup.cfg are sensitive install-hook files, but filename-only failure
          # creates noisy false positives for audited packaging or helper-script changes.
          # Treat the filename as a warning, then fail only when added lines include
          # dangerous install-time behavior or obfuscation patterns.
          SETUP_FILES=$(git diff --name-only "$BASE".."$HEAD" | grep -E '(^|/)(setup\.py|setup\.cfg)$' || true)
          SETUP_CRITICAL_HITS=""
          if [ -n "$SETUP_FILES" ]; then
            while IFS= read -r file; do
              [ -n "$file" ] || continue
              FILE_HITS=$(git diff "$BASE".."$HEAD" -- "$file" \
                | grep -n '^+' \
                | grep -v '^+++' \
                | grep -iE 'base64\.(b64decode|decodebytes|urlsafe_b64decode)|exec\(|eval\(|subprocess\.(Popen|call|run)|os\.system|urllib\.request|requests\.(post|put|patch|get)|socket\.|curl |wget |site-packages|\.pth|chr\(|\\x[0-9a-f]{2}|TOKEN=|SECRET=|API_KEY=' \
                | head -10 || true)
              if [ -n "$FILE_HITS" ]; then
                SETUP_CRITICAL_HITS="${SETUP_CRITICAL_HITS}
          ${file}:
          ${FILE_HITS}"
              fi
            done <<< "$SETUP_FILES"

            if [ -n "$SETUP_CRITICAL_HITS" ]; then
              FINDINGS="${FINDINGS}
          ### 🚨 CRITICAL: setup.py/setup.cfg added dangerous install-hook content
          setup.py/setup.cfg changed and added lines include execution, network, obfuscation, site-packages, or credential-looking patterns.

          **Matches:**
          \`\`\`
          ${SETUP_CRITICAL_HITS}
          \`\`\`
          "
            else
              WARNINGS="${WARNINGS}
          ### ⚠️ Review: setup.py/setup.cfg changed without critical content patterns
          setup.py/setup.cfg files are sensitive because they can run during package installation. The scanner did not find critical added-line patterns, but a maintainer should still review the diff.

          **Files:**
          \`\`\`
          ${SETUP_FILES}
          \`\`\`
          "
            fi
          fi

          if [ -n "$FINDINGS" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "$FINDINGS" > /tmp/findings.md
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$WARNINGS" ]; then
            echo "warnings=true" >> "$GITHUB_OUTPUT"
            echo "$WARNINGS" > /tmp/warnings.md
          else
            echo "warnings=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post critical finding comment
        if: steps.scan.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="## 🚨 CRITICAL Supply Chain Risk Detected

          This PR contains a critical pattern that has been used in real supply chain attacks. A maintainer must review the flagged code carefully before merging.

          $(cat /tmp/findings.md)

          ---
          *Scanner fails only on high-signal indicators: .pth files, base64+exec/eval combos, subprocess with encoded commands, Python auto-start hooks, or dangerous added content in setup.py/setup.cfg.*"

          gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY" || echo "::warning::Could not post PR comment (expected for fork PRs — GITHUB_TOKEN is read-only)"

      - name: Post install-hook review warning
        if: steps.scan.outputs.warnings == 'true' && steps.scan.outputs.found != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="## ⚠️ Supply Chain Review Recommended

          This PR changes setup.py/setup.cfg files. The scanner did not find critical added-line patterns, so this is advisory only, but a maintainer should still review the diff before merging.

          $(cat /tmp/warnings.md)

          ---
          *setup.py/setup.cfg changes are sensitive because they can affect install-time behavior. Filename-only changes warn; dangerous added content still fails CI.*"

          gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY" || echo "::warning::Could not post PR comment (expected for fork PRs — GITHUB_TOKEN is read-only)"

      - name: Fail on critical findings
        if: steps.scan.outputs.found == 'true'
        run: |
          echo "::error::CRITICAL supply chain risk patterns detected in this PR. See the PR comment for details."
          exit 1

  dep-bounds:
    name: Check PyPI dependency upper bounds
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files_url, 'pyproject.toml') || true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Check for unbounded PyPI deps
        id: bounds
        run: |
          set -euo pipefail

          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          # Only check added lines in pyproject.toml
          ADDED=$(git diff "$BASE".."$HEAD" -- pyproject.toml | grep '^+' | grep -v '^+++' || true)

          if [ -z "$ADDED" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Match PyPI dep specs that have >= but no < ceiling.
          # Pattern: "package>=version" without a following ",<" bound.
          # Excludes git+ URLs (which use commit SHAs) and comments.
          UNBOUNDED=$(echo "$ADDED" | grep -oE '"[a-zA-Z0-9_-]+(\[[^\]]*\])?>=[ 0-9.]+"' | grep -v ',<' || true)

          if [ -n "$UNBOUNDED" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "$UNBOUNDED" > /tmp/unbounded.txt
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Post unbounded dep warning
        if: steps.bounds.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="## ⚠️ Unbounded PyPI Dependency Detected

          This PR adds PyPI dependencies without a \`<next_major\` upper bound. Per our [supply chain policy](../blob/main/CONTRIBUTING.md#dependency-pinning-policy-supply-chain-hardening), all PyPI deps must be pinned as \`>=floor,<next_major\`.

          **Unbounded specs found:**
          \`\`\`
          $(cat /tmp/unbounded.txt)
          \`\`\`

          **Fix:** Add an upper bound, e.g. \`\"package>=1.2.0,<2\"\`

          ---
          *See PR #2810 and CONTRIBUTING.md for the full policy rationale.*"

          gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY" || echo "::warning::Could not post PR comment (expected for fork PRs)"

      - name: Fail on unbounded deps
        if: steps.bounds.outputs.found == 'true'
        run: |
          echo "::error::PyPI dependencies without upper bounds detected. Add <next_major ceiling per CONTRIBUTING.md policy."
          exit 1
